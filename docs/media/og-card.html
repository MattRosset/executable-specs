<!doctype html>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    background: #0a0d14;
    background-image:
      radial-gradient(ellipse 900px 500px at 82% 18%, rgba(74,108,190,0.20), transparent 65%),
      radial-gradient(ellipse 700px 600px at 8% 92%, rgba(122,86,180,0.14), transparent 62%);
    font-family: "Segoe UI", Inter, system-ui, sans-serif;
    color: #e8ecf4;
    padding: 84px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  /* faint grid = "contract / structure" without being literal */
  body::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: linear-gradient(115deg, rgba(0,0,0,0.9), transparent 72%);
  }
  .content { position: relative; }
  .kicker {
    font-size: 21px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #7d8aa5;
    font-weight: 600;
    margin-bottom: 26px;
  }
  h1 {
    font-family: "Cascadia Code", Consolas, "Courier New", monospace;
    font-size: 82px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: #ffffff;
    margin-bottom: 30px;
  }
  h1 .dash { color: #6f8bd4; }
  p {
    font-size: 41px;
    line-height: 1.36;
    font-weight: 500;
    color: #c3cddf;
    max-width: 26ch;
  }
  p b { color: #ffffff; font-weight: 700; }
  .foot {
    position: relative;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 22px;
    color: #8b97b0;
    font-weight: 500;
  }
  .foot .sep { color: #3d4759; }
  .foot .who { margin-left: auto; color: #6f8bd4; font-weight: 600; }
</style>
<div class="content">
  <div class="kicker">A working method, not a thought experiment</div>
  <h1>executable<span class="dash">-</span>specs</h1>
  <p>Delegate implementation to AI agents <b>without lowering your engineering standards.</b></p>
</div>
<div class="foot">
  <span>Specs as contracts</span>
  <span class="sep">/</span>
  <span>Review doctrine</span>
  <span class="sep">/</span>
  <span>Gates a broken build fails</span>
  <span class="who">github.com/MattRosset</span>
</div>
